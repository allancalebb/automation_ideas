name: Zoho People Smart Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # allows manual trigger from GitHub UI
    inputs:
      zoho_env:
        description: 'Target environment: live (people.zoho.com) or test (peoplelabs.zoho.com)'
        required: false
        default: 'live'
        type: choice
        options:
          - live
          - test

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install Playwright browsers
        run: mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install --with-deps chromium" -D exec.classpathScope=test

      - name: Run tests (headless)
        env:
          ZOHO_USER: ${{ secrets.ZOHO_USER }}
          ZOHO_PASS: ${{ secrets.ZOHO_PASS }}
          PLAYWRIGHT_HEADLESS: "true"
          # Use workflow_dispatch input when triggered manually; default to 'live' on push/PR
          ZOHO_ENV: ${{ github.event.inputs.zoho_env || 'live' }}
        run: |
          mvn test \
            -D allure.results.directory=target/allure-results \
            -D surefire.useFile=false

      - name: Generate Allure report
        if: always()
        run: |
          mvn allure:report \
            -D allure.results.directory=target/allure-results \
            -D reportDirectory=target/site/allure-report || true

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results/
          retention-days: 14

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/site/allure-report/
          retention-days: 14

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/
          retention-days: 7
